#
# JSON ingest for synthetic security events (sourcetype spelunk:auth).
# INDEXED_EXTRACTIONS=json is the proven pattern (see archived SplunkGate app).
#
[spelunk:auth]
INDEXED_EXTRACTIONS = json
KV_MODE = none
TIMESTAMP_FIELDS = _time
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
category = Structured
disabled = false

#
# KV Store collection for triage history (plan §1b).
# Mutable notes, keyed _key = event_id, read/written by both the agent
# (cockpit "accept triage") and the alert action.
#
[spelunk_triage_notes]
field.event_id = string
field.created = time
field.updated = time
field.user = string
field.verdict = string
field.mitre_technique_id = string
field.mitre_tactic_id = string
field.risk_score = number
field.forecast_summary = string
field.narrative = string
field.analyst_status = string

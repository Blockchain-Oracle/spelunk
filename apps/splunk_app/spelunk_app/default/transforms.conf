#
# Lookups (plan §1b).
#  - KV Store triage notes (mutable).
#  - MITRE ATT&CK technique -> name,tactic (file CSV) for SOC events.
#  - MITRE ATLAS technique mapping (file CSV) for AI-on-AI events.
#
[spelunk_triage_notes_lookup]
external_type = kvstore
collection = spelunk_triage_notes
fields_list = _key, event_id, created, updated, user, verdict, mitre_technique_id, mitre_tactic_id, risk_score, forecast_summary, narrative, analyst_status

[spelunk_attack_lookup]
filename = mitre_attack_techniques.csv

[spelunk_atlas_lookup]
filename = atlas_technique_mapping.csv

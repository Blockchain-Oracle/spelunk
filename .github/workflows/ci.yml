name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: ruff + pytest (spelunk_core)
        working-directory: packages/spelunk_core
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv run ruff check .
          uv run pytest -q

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm -r typecheck

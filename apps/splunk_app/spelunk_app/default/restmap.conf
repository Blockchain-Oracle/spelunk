#
# Spelunk REST handler — the cockpit <-> agent transport (bin/chat_handler.py).
# Exposes /services/spelunk/chat inside splunkd; the cockpit calls it
# same-origin so it inherits the Splunk session (no custom auth).
#
# SPIKE (plan Phase 0): confirm the exact handlertype/base class + python.version
# registration against a local Splunk Enterprise trial before relying on this.
#
[script:spelunk_chat]
match = /spelunk/chat
handler = chat_handler.SpelunkChatHandler
output_modes = json
python.version = python3
passSystemAuth = true

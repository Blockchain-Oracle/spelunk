#
# Custom alert action: auto-triage a notable event (bin/triage_alert_action.py).
# Writes the triage note to the KV Store collection (see collections.conf).
#
[spelunk_triage]
is_custom = 1
label = Spelunk Auto-Triage
description = Run the Spelunk agent over the triggering event(s) and write a triage note to the KV Store.
python.version = python3
alert.execute.cmd = triage_alert_action.py

#
# Self-loading seed data: a synthetic dataset shipped inside the app is
# auto-indexed on enable (most reproducible path for local + judge installs).
# data/seed/spelunk_auth_seed.json is produced by data/ generator at package time.
#
# SPIKE (plan Phase 0): confirm a bundled [monitor] input auto-indexes on first
# enable in the free trial / hosted instance.
#
[monitor://$SPLUNK_HOME/etc/apps/spelunk_app/lookups/seed]
index = spelunk_security
sourcetype = spelunk:auth
disabled = false
